<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Create your free Nexus Task account — Start managing tasks beautifully.">
  <title>Create Account — Nexus Task</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>

  <!-- ===== ANIMATED BACKGROUND ===== -->
  <div class="bg-canvas">
    <div class="bg-gradient-mesh"></div>
    <div class="bg-blob bg-blob-1"></div>
    <div class="bg-blob bg-blob-2"></div>
    <div class="bg-blob bg-blob-3"></div>
    <div class="bg-blob bg-blob-4"></div>
  </div>
  <canvas id="particle-canvas"></canvas>
  <div class="cursor-glow"></div>

  <!-- ===== AUTH PAGE ===== -->
  <div class="auth-page">
    <div class="auth-container">

      <!-- Logo -->
      <a href="/" style="display:flex;align-items:center;gap:12px;justify-content:center;text-decoration:none;margin-bottom:40px;">
        <div class="auth-logo-icon">⚡</div>
        <span class="auth-logo-text">Nexus Task</span>
      </a>

      <!-- Auth Card -->
      <div class="form-card">
        <h1 class="form-title">Create your account</h1>
        <p class="form-subtitle">Join thousands of productive people. Free forever.</p>

        <!-- SIGNUP FORM (action, fields preserved) -->
        <form method="POST" id="signup-form" novalidate>

          <div class="form-group">
            <label class="form-label" for="username">Username</label>
            <div class="input-icon-wrap">
              <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
              <input
                class="form-input"
                type="text"
                name="username"
                id="username"
                placeholder="johndoe"
                required
                autocomplete="username"
              >
            </div>
          </div>

          <div class="form-group">
            <label class="form-label" for="email">Email Address</label>
            <div class="input-icon-wrap">
              <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
              <input
                class="form-input"
                type="email"
                name="email"
                id="email"
                placeholder="you@example.com"
                required
                autocomplete="email"
              >
            </div>
          </div>

          <div class="form-group">
            <label class="form-label" for="password">Password</label>
            <div class="input-icon-wrap">
              <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
              <input
                class="form-input"
                type="password"
                name="password"
                id="password"
                placeholder="Create a strong password"
                required
                autocomplete="new-password"
              >
            </div>
          </div>

          <button type="submit" class="btn btn-primary" id="signup-btn" style="width:100%;padding:14px;font-size:15px;border-radius:var(--radius-md);margin-top:8px;">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg>
            Create Account
          </button>
        </form>

        <div class="divider">
          <div class="divider-text">Already have an account?</div>
        </div>

        <div class="form-footer">
          <a href="/login" class="btn btn-ghost" style="width:100%;justify-content:center;">
            Sign in instead
          </a>
        </div>
      </div>

      <!-- Terms note -->
      <p style="text-align:center; margin-top:24px; font-size:13px; color:var(--text-muted);">
        By signing up, you agree to our
        <a href="#" class="form-link">Terms of Service</a> &amp;
        <a href="#" class="form-link">Privacy Policy</a>
      </p>

      <!-- Theme toggle -->
      <div style="display:flex; justify-content:center; margin-top:20px;">
        <button id="theme-toggle" class="icon-btn" title="Toggle theme">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        </button>
      </div>
    </div>
  </div>

  <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
