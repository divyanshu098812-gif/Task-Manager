<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Edit your task in Nexus Task dashboard.">
  <title>Edit Task — Nexus Task</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>

  <!-- ===== ANIMATED BACKGROUND ===== -->
  <div class="bg-canvas">
    <div class="bg-gradient-mesh"></div>
    <div class="bg-blob bg-blob-1"></div>
    <div class="bg-blob bg-blob-2"></div>
    <div class="bg-blob bg-blob-3"></div>
  </div>
  <canvas id="particle-canvas"></canvas>
  <div class="cursor-glow"></div>

  <!-- ===== APP LAYOUT ===== -->
  <div class="app-layout">

    <!-- ===== SIDEBAR ===== -->
    {% include '_sidebar.html' %}

    <!-- ===== MAIN CONTENT ===== -->
    <main class="main-content" id="main-content">

      <!-- Navbar -->
      <header class="navbar">
        <div class="navbar-left">
          <span class="navbar-page-title">Edit Task</span>
        </div>
        <div class="navbar-right">
          <button id="theme-toggle" class="icon-btn" title="Toggle theme">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
          </button>
          <a href="{{ url_for('tasks') }}" class="btn btn-ghost btn-sm">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
            Back to Tasks
          </a>
        </div>
      </header>

      <!-- Page Content -->
      <div class="page-content" style="display:flex; align-items:flex-start; justify-content:center; min-height:calc(100vh - 65px);">
        <div class="form-container" style="width:100%; padding-top:var(--space-xl);">

          <!-- Breadcrumb -->
          <div style="display:flex; align-items:center; gap:8px; font-size:13px; color:var(--text-muted); margin-bottom:var(--space-xl);">
            <a href="{{ url_for('tasks') }}" style="color:var(--text-muted); text-decoration:none; transition:color 0.2s;" onmouseover="this.style.color='var(--text-primary)'" onmouseout="this.style.color='var(--text-muted)'">Dashboard</a>
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
            <span style="color:var(--text-primary); font-weight:500;">Edit Task</span>
          </div>

          <!-- Form Card -->
          <div class="form-card" data-tilt data-tilt-strength="3">
            <div style="display:flex; align-items:center; gap:14px; margin-bottom:var(--space-lg);">
              <div style="width:44px;height:44px;border-radius:var(--radius-md);background:linear-gradient(135deg,#8b5cf6,#6366f1);display:flex;align-items:center;justify-content:center;box-shadow:0 0 20px rgba(139,92,246,0.4);">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
              </div>
              <div>
                <h1 class="form-title" style="font-size:22px; margin:0;">Edit Task</h1>
                <p class="form-subtitle" style="margin:0;">Update the details for this task.</p>
              </div>
            </div>

            <!-- Editing label -->
            <div style="display:flex; align-items:center; gap:8px; padding:10px 14px; background:rgba(99,102,241,0.08); border:1px solid rgba(99,102,241,0.15); border-radius:var(--radius-md); margin-bottom:var(--space-lg);">
              <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--primary-light)" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
              <span style="font-size:13px; color:var(--primary-light); font-weight:500;">
                Editing: <strong>{{ task.title }}</strong>
              </span>
            </div>

            <!-- EDIT TASK FORM (action, fields, Jinja vars preserved) -->
            <form method="POST" id="edit-task-form" novalidate>

              <div class="form-group">
                <label class="form-label" for="title">Task Title *</label>
                <div class="input-icon-wrap">
                  <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
                  <input
                    class="form-input"
                    type="text"
                    name="title"
                    id="title"
                    value="{{ task.title }}"
                    required
                    autocomplete="off"
                  >
                </div>
              </div>

              <div class="form-group">
                <label class="form-label" for="description">Description</label>
                <textarea
                  class="form-textarea"
                  name="description"
                  id="description"
                  rows="4"
                >{{ task.description }}</textarea>
              </div>

              <div class="form-group">
                <label class="form-label" for="deadline">Deadline</label>
                <div class="input-icon-wrap">
                  <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                  <input
                    class="form-input"
                    type="date"
                    name="deadline"
                    id="deadline"
                    value="{{ task.deadline }}"
                  >
                </div>
              </div>

              <div style="display:flex; gap:var(--space-sm); margin-top:var(--space-md);">
                <button type="submit" class="btn btn-primary" id="update-task-btn" style="flex:1; padding:14px; font-size:15px;">
                  <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
                  Update Task
                </button>
                <a href="{{ url_for('tasks') }}" class="btn btn-ghost" style="padding:14px 20px; font-size:15px;">
                  Cancel
                </a>
              </div>
            </form>
          </div>

        </div>
      </div>
    </main>
  </div>

  <script src="{{ url_for('static', filename='script.js') }}"></script>
  <script>
    document.getElementById('sidebar-toggle-btn')?.addEventListener('click', () => Sidebar && Sidebar.toggle());
  </script>
</body>
</html>
