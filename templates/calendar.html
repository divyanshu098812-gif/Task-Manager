<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Calendar — Nexus Task due dates and scheduling.">
  <title>Calendar — Nexus Task</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='notifications.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='charts.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='chat.css') }}">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
<div class="bg-canvas">
  <div class="bg-gradient-mesh"></div>
  <div class="bg-blob bg-blob-1"></div>
  <div class="bg-blob bg-blob-2"></div>
</div>
<canvas id="particle-canvas"></canvas>
<div class="cursor-glow"></div>

<div class="app-layout-full">
  {% set active_page = 'calendar' %}
  {% include '_topnav.html' %}

  <main class="main-content main-content-full" id="main-content">
    <div class="page-content page-content-full">

      <!-- Page Header -->
      <div class="welcome-hero" style="padding-bottom:var(--space-lg);">
        <div class="welcome-greeting">Schedule</div>
        <h1 class="welcome-name">Task <span>Calendar</span></h1>
        <p class="welcome-subtitle">View your tasks by deadline. Click any date to see what's due.</p>
      </div>

      <!-- ===== CALENDAR LAYOUT ===== -->
      <div class="calendar-layout">

        <!-- Calendar Column -->
        <div class="calendar-main">
          <!-- Month Navigation -->
          <div class="calendar-nav">
            <button class="cal-nav-btn" id="cal-prev" title="Previous month">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
            </button>
            <h2 class="cal-month-title" id="cal-month-label">July 2026</h2>
            <button class="cal-nav-btn" id="cal-next" title="Next month">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
            </button>
          </div>

          <!-- Weekday Headers -->
          <div class="cal-weekdays">
            <div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div>
            <div style="color:var(--primary-light);">Sat</div>
            <div style="color:var(--danger);">Sun</div>
          </div>

          <!-- Calendar Grid -->
          <div class="cal-grid" id="cal-grid"></div>
        </div>

        <!-- Side Panel -->
        <div class="calendar-side">
          <!-- Selected Day Tasks -->
          <div class="cal-side-card" id="day-panel">
            <div class="chart-card-header">
              <div class="chart-card-title" id="day-panel-title">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--primary-light)" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                Select a date
              </div>
            </div>
            <div id="day-tasks-list" style="padding:0 4px;">
              <div style="text-align:center; padding:32px 16px; color:var(--text-muted); font-size:13px;">
                Click a date to view tasks due on that day.
              </div>
            </div>
          </div>

          <!-- Upcoming Deadlines -->
          <div class="cal-side-card" style="margin-top:var(--space-md);">
            <div class="chart-card-header">
              <div class="chart-card-title">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fbbf24" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
                Upcoming
              </div>
              <span class="chart-card-subtitle">Next 7 days</span>
            </div>
            <div id="upcoming-list"></div>
          </div>

          <!-- Stats Mini -->
          <div class="cal-side-card" style="margin-top:var(--space-md);">
            <div class="chart-card-header">
              <div class="chart-card-title">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#34d399" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                Quick Stats
              </div>
            </div>
            <div id="cal-quick-stats" style="padding:4px 0;"></div>
          </div>
        </div>

      </div><!-- /calendar-layout -->
    </div><!-- /page-content-full -->
  </main>
</div>

<script>
const CAL_TASKS = {{ tasks | tojson }};
</script>
<script src="{{ url_for('static', filename='script.js') }}"></script>
<script src="{{ url_for('static', filename='notifications.js') }}"></script>
<script>
// ============================================================
// Calendar Page — Premium Vanilla JS Implementation
// ============================================================
(function() {
  const tasks   = CAL_TASKS;
  const today   = new Date(); today.setHours(0,0,0,0);
  let viewYear  = today.getFullYear();
  let viewMonth = today.getMonth();
  let selectedDate = null;

  const taskMap = {};
  tasks.forEach(t => {
    if (!t.deadline) return;
    const key = t.deadline.substring(0,10);
    if (!taskMap[key]) taskMap[key] = [];
    taskMap[key].push(t);
  });

  function renderCalendar() {
    const grid   = document.getElementById('cal-grid');
    const label  = document.getElementById('cal-month-label');
    const month  = new Date(viewYear, viewMonth, 1);
    label.textContent = month.toLocaleString('default',{month:'long',year:'numeric'});

    let startDay = month.getDay();
    startDay = startDay === 0 ? 6 : startDay - 1;

    const daysInMonth   = new Date(viewYear, viewMonth+1, 0).getDate();
    const daysInPrev    = new Date(viewYear, viewMonth, 0).getDate();

    let html = '';
    for (let i = startDay - 1; i >= 0; i--) {
      html += `<div class="cal-cell cal-cell-other">${daysInPrev - i}</div>`;
    }

    for (let d = 1; d <= daysInMonth; d++) {
      const dateStr = `${viewYear}-${String(viewMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const cellDate = new Date(viewYear, viewMonth, d);
      const isToday  = cellDate.getTime() === today.getTime();
      const isSel    = selectedDate === dateStr;
      const dayTasks = taskMap[dateStr] || [];
      const hasOver  = dayTasks.some(t => t.status !== 'Completed' && cellDate < today);
      const hasDone  = dayTasks.some(t => t.status === 'Completed');
      const hasPend  = dayTasks.some(t => t.status !== 'Completed');

      let classes = 'cal-cell cal-cell-cur';
      if (isToday)   classes += ' cal-today';
      if (isSel)     classes += ' cal-selected';
      if (cellDate < today && !isToday) classes += ' cal-past';

      const dots = [
        hasDone  ? '<span class="cal-dot dot-done"></span>'    : '',
        hasPend  ? '<span class="cal-dot dot-pending"></span>' : '',
        hasOver  ? '<span class="cal-dot dot-over"></span>'    : '',
      ].join('');

      html += `<div class="${classes}" data-date="${dateStr}" onclick="selectDate('${dateStr}')">
        <span class="cal-day-num">${d}</span>
        ${dayTasks.length ? `<div class="cal-dots">${dots}</div>` : ''}
        ${dayTasks.length ? `<span class="cal-task-count">${dayTasks.length}</span>` : ''}
      </div>`;
    }

    const totalCells = Math.ceil((startDay + daysInMonth) / 7) * 7;
    const remaining  = totalCells - (startDay + daysInMonth);
    for (let d = 1; d <= remaining; d++) {
      html += `<div class="cal-cell cal-cell-other">${d}</div>`;
    }

    grid.innerHTML = html;
    renderUpcoming();
    renderQuickStats();
  }

  window.selectDate = function(dateStr) {
    selectedDate = dateStr;
    renderCalendar();

    const panel      = document.getElementById('day-panel-title');
    const list       = document.getElementById('day-tasks-list');
    const dayTasks   = taskMap[dateStr] || [];
    const d          = new Date(dateStr + 'T00:00:00');
    const label      = d.toLocaleDateString('default',{weekday:'long', month:'long', day:'numeric'});

    panel.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--primary-light)" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg> ${label}`;

    if (!dayTasks.length) {
      list.innerHTML = `<div style="text-align:center; padding:24px 12px; color:var(--text-muted); font-size:13px;">No tasks due on this date.<br><a href="/add" class="form-link" style="margin-top:8px; display:inline-block;">+ Add a task</a></div>`;
      return;
    }

    list.innerHTML = dayTasks.map(t => `
      <div class="timeline-item" style="padding:10px 0; border-bottom:1px solid var(--border-subtle);">
        <div class="timeline-dot ${t.status==='Completed'?'dot-done':'dot-pending'}"></div>
        <div class="timeline-body">
          <div class="timeline-title" style="font-size:13px;">${t.title}</div>
          <div class="timeline-meta">
            <span class="task-status-badge ${t.status==='Completed'?'status-completed':'status-pending'}" style="font-size:10px;padding:2px 8px;"><span class="status-dot"></span>${t.status}</span>
            <a href="/edit/${t.id}" class="form-link" style="font-size:11px;">Edit</a>
          </div>
        </div>
      </div>`).join('');
  };

  function renderUpcoming() {
    const el = document.getElementById('upcoming-list');
    const upcoming = [];
    for (let i=0; i<=7; i++) {
      const d = new Date(today);
      d.setDate(d.getDate() + i);
      const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
      (taskMap[key]||[]).forEach(t => {
        if (t.status !== 'Completed') upcoming.push({...t, _date:key, _days:i});
      });
    }
    if (!upcoming.length) {
      el.innerHTML = '<div style="text-align:center;padding:20px 12px;color:var(--text-muted);font-size:12px;">No upcoming deadlines 🎉</div>';
      return;
    }
    el.innerHTML = upcoming.slice(0,6).map(t => `
      <div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border-subtle);">
        <div style="width:36px;height:36px;border-radius:10px;background:rgba(99,102,241,0.12);display:flex;align-items:center;justify-content:center;flex-shrink:0;">
          <span style="font-size:11px;font-weight:800;color:var(--primary-light);">${t._days===0?'Today':t._days===1?'Tmrw':t._days+'d'}</span>
        </div>
        <div style="overflow:hidden;">
          <div style="font-size:12px;font-weight:600;color:var(--text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${t.title}</div>
          <div style="font-size:10px;color:var(--text-muted);">${new Date(t._date+'T00:00:00').toLocaleDateString('default',{month:'short',day:'numeric'})}</div>
        </div>
      </div>`).join('');
  }

  function renderQuickStats() {
    const total     = tasks.length;
    const completed = tasks.filter(t=>t.status==='Completed').length;
    const withDl    = tasks.filter(t=>t.deadline).length;
    const noTask    = !total;

    document.getElementById('cal-quick-stats').innerHTML = noTask
      ? '<div style="text-align:center;padding:16px;color:var(--text-muted);font-size:12px;">No tasks yet</div>'
      : `<div style="display:flex;flex-direction:column;gap:8px;padding:4px 0;">
          ${[['Total Tasks',total,'var(--primary-light)'],['Completed',completed,'#34d399'],['With Deadline',withDl,'#fbbf24']].map(([l,v,c])=>`
            <div style="display:flex;justify-content:space-between;align-items:center;font-size:12px;">
              <span style="color:var(--text-muted);">${l}</span>
              <strong style="color:${c};font-size:14px;">${v}</strong>
            </div>`).join('')}
          <div style="margin-top:4px;">
            <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--text-muted);margin-bottom:4px;"><span>Completion</span><span>${total>0?Math.round(completed/total*100):0}%</span></div>
            <div style="background:var(--border-subtle);border-radius:4px;height:4px;overflow:hidden;">
              <div style="background:linear-gradient(90deg,#34d399,#6366f1);height:100%;width:${total>0?Math.round(completed/total*100):0}%;border-radius:4px;transition:width 1s;"></div>
            </div>
          </div>
        </div>`;
  }

  document.getElementById('cal-prev').addEventListener('click', ()=>{ viewMonth--; if(viewMonth<0){viewMonth=11;viewYear--;} renderCalendar(); });
  document.getElementById('cal-next').addEventListener('click', ()=>{ viewMonth++; if(viewMonth>11){viewMonth=0;viewYear++;} renderCalendar(); });

  renderCalendar();
  const todayStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
  if(taskMap[todayStr]) selectDate(todayStr);
})();
</script>
<script src="{{ url_for('static', filename='chat.js') }}"></script>
</body>
</html>
